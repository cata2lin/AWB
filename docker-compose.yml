services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: awb-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://awb_user:awb_pass@db:5432/awb_db
      - FRISBO_API_URL=https://ingest.apis.store-view.frisbo.dev
      - FRISBO_API_TOKEN=${FRISBO_API_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - pdf_storage:/app/storage
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: awb-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: awb-db
    environment:
      - POSTGRES_USER=awb_user
      - POSTGRES_PASSWORD=awb_pass
      - POSTGRES_DB=awb_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U awb_user -d awb_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  pdf_storage:
